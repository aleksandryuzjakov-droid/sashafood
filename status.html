<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Статус заказа — Саша Food</title>
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f6f6f6;
    color: #222;
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 18px;
  }
  .box {
    max-width: 560px;
    width: 100%;
    background: white;
    border-radius: 34px;
    padding: 28px;
    box-shadow: 0 10px 35px rgba(0,0,0,.08);
  }
  .logo {
    font-size: 26px;
    font-weight: 900;
    margin-bottom: 18px;
  }
  .logo span { color: #f8c600; }
  .big {
    font-size: 60px;
    text-align: center;
    margin: 16px 0;
  }
  h1 { margin: 0 0 10px; }
  .status {
    background: #fff4b8;
    border-radius: 20px;
    padding: 18px;
    font-size: 24px;
    font-weight: 900;
    text-align: center;
  }
  .steps {
    display: grid;
    gap: 10px;
    margin-top: 18px;
  }
  .step {
    padding: 14px;
    border-radius: 16px;
    background: #f1f1f1;
    font-weight: 800;
    opacity: .45;
  }
  .step.active {
    background: #ffcc00;
    opacity: 1;
  }
  .small {
    color: #777;
    margin-top: 14px;
  }
  a {
    display: inline-block;
    margin-top: 18px;
    color: #222;
    font-weight: 900;
  }
</style>
</head>
<body>
<div class="box">
  <div class="logo">Саша <span>Food</span></div>
  <div class="big" id="emoji">⏳</div>
  <h1 id="title">Заказ загружается...</h1>
  <div class="status" id="statusText">Проверяем статус</div>

  <div class="steps">
    <div class="step" id="waiting">⏳ Ожидание</div>
    <div class="step" id="accepted">✅ Принят</div>
    <div class="step" id="cooking">🍳 Готовится</div>
    <div class="step" id="delivery">🚗 Едет</div>
    <div class="step" id="done">🏁 Доставлен</div>
  </div>

  <div class="small">Статус обновляется сам каждые 2 секунды.</div>
  <a href="/">← Вернуться к меню</a>
</div>

<script>
const params = new URLSearchParams(location.search);
const id = params.get("id") || localStorage.getItem("lastOrderId");

const map = {
  waiting: { text: "⏳ Ожидает принятия", emoji: "⏳", step: "waiting" },
  accepted: { text: "✅ Заказ принят", emoji: "✅", step: "accepted" },
  cooking: { text: "🍳 Заказ готовится", emoji: "🍳", step: "cooking" },
  delivery: { text: "🚗 Заказ едет", emoji: "🚗", step: "delivery" },
  done: { text: "🏁 Заказ доставлен", emoji: "🏁", step: "done" },
  declined: { text: "❎ Заказ отклонён", emoji: "❎", step: "" }
};

async function loadStatus() {
  if (!id) {
    title.textContent = "Заказ не найден";
    statusText.textContent = "Нет номера заказа";
    return;
  }

  const res = await fetch("/api/order/" + id);
  const data = await res.json();

  if (!data.ok) {
    title.textContent = "Заказ не найден";
    statusText.textContent = "Возможно сервер перезапускался";
    return;
  }

  const s = map[data.order.status] || map.waiting;
  title.textContent = "Ваш заказ №" + id;
  statusText.textContent = s.text;
  emoji.textContent = s.emoji;

  document.querySelectorAll(".step").forEach(x => x.classList.remove("active"));
  if (s.step) document.getElementById(s.step).classList.add("active");
}

loadStatus();
setInterval(loadStatus, 2000);
</script>
</body>
</html>
